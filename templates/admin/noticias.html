{% extends "base.html" %}
{% block title %}Notícias - Painel SEMEA{% endblock %}

{% block content %}
<section class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Gerenciar Notícias</h2>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <!-- Formulário nova notícia -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <h5 class="fw-bold">Publicar Nova Notícia</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" class="form-control" name="titulo" placeholder="Título da notícia" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Conteúdo</label>
                        <textarea class="form-control" name="conteudo" rows="4" placeholder="Escreva o comunicado..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-megaphone"></i> Publicar
                    </button>
                </form>
            </div>
        </div>

        <!-- Lista de notícias existentes -->
        {% for n in noticias %}
        <div class="card border-0 shadow-sm mb-2">
            <div class="card-body">
                <h6 class="fw-bold">{{ n.titulo }}</h6>
                <p class="text-muted small mb-0">{{ n.conteudo[:150] }}... • {{ n.data_publicacao.strftime('%d/%m/%Y') }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
