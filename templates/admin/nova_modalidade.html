{% extends "base.html" %}
{% block title %}Nova Modalidade - Painel SEMEA{% endblock %}

{% block content %}
<section class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h2 class="fw-bold">Adicionar Nova Modalidade</h2>
                <p class="text-muted mb-4">Preencha os dados da nova turma/modalidade.</p>

                <form method="POST">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nome da Modalidade</label>
                                    <input type="text" class="form-control" name="nome" placeholder="Ex: Futsal" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Instrutor</label>
                                    <input type="text" class="form-control" name="instrutor" placeholder="Nome do professor" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Local</label>
                                <input type="text" class="form-control" name="local" placeholder="Ex: Escola Maria Valverde" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Endereço</label>
                                <input type="text" class="form-control" name="endereco" placeholder="Rua, número - Bairro" required>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Dia da Semana</label>
                                    <input type="text" class="form-control" name="dia_semana" placeholder="Ex: Segunda-feira" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Horário</label>
                                    <input type="text" class="form-control" name="horario" placeholder="Ex: 18h00 às 19h30" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Faixa Etária</label>
                                    <input type="text" class="form-control" name="faixa_etaria" placeholder="Ex: 7 a 14" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-circle"></i> Adicionar
                            </button>
                            <a href="{{ url_for('admin_modalidades') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
